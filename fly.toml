# fly.toml — replace "vixtracker" with your chosen app name
app = "vixtracker"
primary_region = "ewr"  # Newark (close to NY) — change if you prefer

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
